<ion-content [fullscreen]="true" class="conta-content">

  <div class="conta-container">

    <!-- Top: título -->
    <div class="top-area">
      <h1>Verde<span>Vegan</span></h1>
    </div>

    <div class="card-conta">

      <!-- Cabeçalho com botão voltar -->
      <div class="card-header">

        <ion-icon
          name="arrow-back-outline"
          class="back-icon"
          (click)="voltar()">
        </ion-icon>
        
        <h2>OS MEUS DADOS</h2>
      </div>

      <!-- Avatar: foto ou ícone padrão, clicável para mudar foto -->
      <div class="avatar" (click)="inputFoto.click()">

        <img
          *ngIf="fotoPerfil"
          [src]="fotoPerfil"
          alt="Foto de perfil"
          class="foto-perfil"
        />

        <ion-icon
          *ngIf="!fotoPerfil"
          name="person-circle-outline">
        </ion-icon>

      </div>

      <!-- Input file escondido -->
      <input
        type="file"
        accept="image/*"
        hidden
        #inputFoto
        (change)="selecionarFoto($event)"
      />

      <!-- Link clicável para alterar foto -->
      <p class="alterar-foto" (click)="inputFoto.click()">
        Alterar foto
      </p>

      <!-- Dados do utilizador: nome, email, contacto, morada -->
      <h3>{{ utilizador.nome || 'Utilizador' }}</h3>

      <p><strong>Email:</strong> {{ utilizador.email }}</p>
      <p><strong>Contacto:</strong> {{ utilizador.contacto }}</p>
      <p><strong>Morada:</strong> {{ utilizador.morada }}</p>

      <!-- Botão para terminar sessão (logout) -->
      <button class="btn-sair" (click)="terminarSessao()">
        Terminar sessão
      </button>

    </div>

  </div>

</ion-content>
